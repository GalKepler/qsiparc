repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--explicit-package-bases, src/qsiparc]
        pass_filenames: false
        additional_dependencies:
          - nibabel>=5.0
          - numpy>=1.24
          - pandas>=2.0
          - pandas-stubs>=2.0
          - scipy>=1.10
          - click>=8.0
          - types-click
